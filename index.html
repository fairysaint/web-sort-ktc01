<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điều Hành Sort KTC 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <style>
        /* Tự động tăng chiều cao theo nội dung cho textarea */
        .auto-height {
            overflow: hidden;
            height: auto;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 text-[11px]">

    <div id="root"></div>

    <script>
        const SPREADSHEET_ID = "2PACX-1vR9Dr7VQeqSwvvbv0HCypWct2ygmiDh4wsWmBm-n7XZCeIMPuOAtePGf2w1KNPv_d7G3b6lQiCQnIMv";
        
        const URL_LICH_LAM_VIEC = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=594239313&output=csv`;
        const URL_REPORT_DAILY  = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=625772510&output=csv`;
        const URL_VI_PHAM       = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=0&output=csv`;
        const URL_BIEN_BAN      = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=735999237&output=csv`;

        const e = React.createElement;

        function parseCSV(text) {
          if (!text) return [];
          let lines = text.split(/\r\n|\n/);
          return lines.map(line => {
            let result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
              let char = line[i];
              if (char === '"') { inQuotes = !inQuotes; }
              else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
              else { current += char; }
            }
            result.push(current.trim());
            return result;
          }).filter(row => row.length > 0);
        }

        function timeToHours(tStr) {
          if (!tStr || !tStr.includes(':')) return 0;
          const [h, m] = tStr.split(':').map(Number);
          return h + (m / 60);
        }

        function getTodayString() {
          const today = new Date();
          const dd = String(today.getDate()).padStart(2, '0');
          const mm = String(today.getMonth() + 1).padStart(2, '0');
          const yyyy = today.getFullYear();
          return `${dd}/${mm}/${yyyy}`;
        }

        function App() {
          const [activeTab, setActiveTab] = React.useState('report-daily');
          const [filterName, setFilterName] = React.useState('');
          const [filterMonth, setFilterMonth] = React.useState('');

          const [allLichHeaders, setAllLichHeaders] = React.useState([]); 
          const [lichRows, setLichRows] = React.useState([]);       
          const [weekOffset, setWeekOffset] = React.useState(0); 

          const [violationData, setViolationData] = React.useState([]);
          const [bienbanData, setBienbanData] = React.useState([]);
          const [isLoading, setIsLoading] = React.useState(true);

          const todayStr = React.useMemo(() => getTodayString(), []);

          const [inputs, setInputs] = React.useState({
            vt_leader: 'Leader', v_leader: '07:30', r_leader: '16:30', tns_leader: 3, skh_leader: 3, sdung_leader: 3, note_leader: '',
            vt_nsuat: 'NV Năng suất', v_nsuat: '07:00', r_nsuat: '16:30', tns_nsuat: 40, skh_nsuat: 31, sdung_nsuat: 31, note_nsuat: '1 nhân viên off bệnh',
            vt_gcong: 'NV Giờ công', v_gcong: '07:00', r_gcong: '17:30', tns_gcong: 2, skh_gcong: 2, sdung_gcong: 2, note_gcong: '',
            vt_thuviec: 'Nhân viên thử việc', v_thuviec: '07:30', r_thuviec: '16:30', tns_thuviec: 0, skh_thuviec: 0, sdung_thuviec: 0, note_thuviec: '',
            vt_fl_had: 'FL - Hoa Anh Đào', v_fl_had: '08:00', r_fl_had: '17:00', tns_fl_had: 0, skh_fl_had: 0, sdung_fl_had: 0, note_fl_had: '',
            vt_fl_viec: 'FL - Viecco', v_fl_viec: '08:00', r_fl_viec: '17:00', tns_fl_viec: 0, skh_fl_viec: 0, sdung_fl_viec: 0, note_fl_viec: '',

            feeder_cbs1: 19701, feeder_cbs2: 37422, tron_lan: 1000, forecast: 65000,
            hang_cho_ra: 2990, hang_cho_xuat: 40892, hang_lien_vung: 0, hang_noi_vung: 0,
            phat_sinh: 'Không'
          });

          React.useEffect(() => {
            async function loadAllData() {
              try {
                setIsLoading(true);
                const resLich = await fetch(URL_LICH_LAM_VIEC);
                const rawLich = parseCSV(await resLich.text());
                
                if (rawLich.length > 4) {
                  let dates = rawLich[2] || [];
                  let days = rawLich[3] || [];
                  let headers = [];
                  for(let colIdx = 4; colIdx < dates.length; colIdx++) {
                    if (dates[colIdx]) {
                      headers.push({ index: colIdx, dateStr: dates[colIdx], dayStr: days[colIdx] || '' });
                    }
                  }
                  setAllLichHeaders(headers);

                  let parsedStaff = [];
                  for (let i = 4; i < rawLich.length; i++) {
                    const row = rawLich[i];
                    if (row[3] && (row[3].includes("Tổng") || row[3].includes("Nhóm"))) break;
                    if (row[3]) {
                      parsedStaff.push({
                        gioitinh: row[0] || '', stt: row[1] || '', msnv: row[2] || '', name: row[3], rawRow: row
                      });
                    }
                  }
                  setLichRows(parsedStaff);
                }

                const resVi = await fetch(URL_VI_PHAM);
                const rowsVi = parseCSV(await resVi.text());
                let parsedVi = [];
                rowsVi.forEach((row, idx) => {
                  if (idx > 0 && row[2]) parsedVi.push({ id: idx, time: row[0], code: row[1], name: row[2], error: row[3], userId: row[4], reporter: row[5] });
                });
                setViolationData(parsedVi);

                const resBb = await fetch(URL_BIEN_BAN);
                const rowsBb = parseCSV(await resBb.text());
                let parsedBb = [];
                rowsBb.forEach((row, idx) => {
                  if (idx > 0 && row[2]) parsedBb.push({ id: idx, date: row[0], username: row[1], name: row[2], content: row[3], userId: row[4], creator: row[5], image: row[6] });
                });
                setBienbanData(parsedBb);
                setIsLoading(false);
              } catch (err) {
                console.error(err);
                setIsLoading(false);
              }
            }
            loadAllData();
          }, []);

          const handleInputChange = (key, value, isNum = false) => {
            setInputs(p => ({ ...p, [key]: isNum ? (parseFloat(value) || 0) : value }));
          };

          const copyToClipboard = (text, message) => {
            navigator.clipboard.writeText(text);
            alert(message);
          };

          const computed = React.useMemo(() => {
            const i = inputs;

            const calcGc = (v, r) => {
              const diff = timeToHours(r) - timeToHours(v);
              return diff > 1 ? diff - 1 : 0;
            };

            const gc_leader = calcGc(i.v_leader, i.r_leader);
            const gc_nsuat = calcGc(i.v_nsuat, i.r_nsuat);
            const gc_gcong = calcGc(i.v_gcong, i.r_gcong);
            const gc_thuviec = calcGc(i.v_thuviec, i.r_thuviec);
            const gc_fl_had = calcGc(i.v_fl_had, i.r_fl_had);
            const gc_fl_viec = calcGc(i.v_fl_viec, i.r_fl_viec);

            const gctt_leader = gc_leader * i.sdung_leader;
            const gctt_nsuat = gc_nsuat * i.sdung_nsuat;
            const gctt_gcong = gc_gcong * i.sdung_gcong;
            const gctt_thuviec = gc_thuviec * i.sdung_thuviec;
            const gctt_fl_had = gc_fl_had * i.sdung_fl_had;
            const gctt_fl_viec = gc_fl_viec * i.sdung_fl_viec;

            const total_tns = i.tns_leader + i.tns_nsuat + i.tns_gcong + i.tns_thuviec + i.tns_fl_had + i.tns_fl_viec;
            const total_skh = i.skh_leader + i.skh_nsuat + i.skh_gcong + i.skh_thuviec + i.skh_fl_had + i.skh_fl_viec;
            const total_sdung = i.sdung_leader + i.sdung_nsuat + i.sdung_gcong + i.sdung_thuviec + i.sdung_fl_had + i.sdung_fl_viec;
            const total_gctt = gctt_leader + gctt_nsuat + gctt_gcong + gctt_thuviec + gctt_fl_had + gctt_fl_viec;

            const act_don = i.feeder_cbs1 + i.feeder_cbs2 + i.tron_lan;
            
            const tile_leader = i.skh_leader > 0 ? Math.round((i.sdung_leader / i.skh_leader) * 100) : 0;
            const tile_nsuat = i.skh_nsuat > 0 ? Math.round((i.sdung_nsuat / i.skh_nsuat) * 100) : 0;
            const tile_gcong = i.skh_gcong > 0 ? Math.round((i.sdung_gcong / i.skh_gcong) * 100) : 0;
            const tile_thuviec = i.skh_thuviec > 0 ? Math.round((i.sdung_thuviec / i.skh_thuviec) * 100) : 0;
            const tile_fl_had = i.skh_fl_had > 0 ? Math.round((i.sdung_fl_had / i.skh_fl_had) * 100) : 0;
            const tile_fl_viec = i.skh_fl_viec > 0 ? Math.round((i.sdung_fl_viec / i.skh_fl_viec) * 100) : 0;
            
            const total_fl_skh = i.skh_fl_had + i.skh_fl_viec;
            const total_fl_sdung = i.sdung_fl_had + i.sdung_fl_viec;
            const tile_fl = total_fl_skh > 0 ? Math.round((total_fl_sdung / total_fl_skh) * 100) : 0;

            const tile_tong = total_skh > 0 ? Math.round((total_sdung / total_skh) * 100) : 0;
            
            // NĂNG SUẤT ĐIỂM DANH (Tính dựa trên thực tế xử lý Act)
            const nang_suat_diem_danh = total_gctt > 0 ? Math.round(act_don / total_gctt) : 0;

            // NĂNG SUẤT BÁO CÁO (Tính dựa trên kế hoạch Forecast)
            const nang_suat_bao_cao = total_gctt > 0 ? Math.round(i.forecast / total_gctt) : 0;

            const dapt_dat = tile_tong >= 100 ? 100 : tile_tong;
            const dapt_thieu = tile_tong >= 100 ? 0 : (100 - tile_tong);

            const reportText = `${todayStr}\n` +
                               `Báo cáo cuối ca Sort (07:30-16:30) KTC HCM 01\n\n` +
                               `1/ Lượng hàng.\n` +
                               `a. Forecast (đơn):${i.forecast.toLocaleString()}\n` +
                               `b. Act (đơn):${act_don.toLocaleString()}\n\n` +
                               `2/ Nhân sự.\n` +
                               `a. Nhân viên năng suất:${tile_nsuat}% ${i.sdung_nsuat}/${i.skh_nsuat}\n` +
                               `b. Nhân viên giờ công:${tile_gcong}% ${i.sdung_gcong}/${i.skh_gcong}\n` +
                               `c. Freelancer:${tile_fl}% ${total_fl_sdung}/${total_fl_skh}\n` +
                               `Tổng đáp ứng nhân sự:${tile_tong}%\n\n` +
                               `3/ Năng suất:${nang_suat_bao_cao}đơn/h\n\n` +
                               `4/ Hàng hóa:\n` +
                               `Data ghi nhận :${todayStr} 16:30:00\n` +
                               `a. Hàng nhận chờ rã (đơn):${i.hang_cho_ra}đơn\n` +
                               `-Hàng liên vùng trước mốc bàn giao 15:00:${i.hang_lien_vung}đơn\n` +
                               `-Hàng nội vùng trước mốc bàn giao 16:00:${i.hang_noi_vung}đơn\n` +
                               `b. Hàng sort đã xử lý:\n` +
                               `- Trạng thái khởi tạo chờ xuất ${i.hang_cho_xuat}đơn\n\n` +
                               `5/ Phát sinh trong ca:\n` +
                               `- ${i.phat_sinh}`;

            const formatGctt = (val) => val.toFixed(1).replace('.', ',');

            const allHoursText = `Công Leader: ${gctt_leader.toFixed(1)}\n` +
                                 `Công NV (Năng suất): ${gctt_nsuat.toFixed(1)}\n` +
                                 `Công CTV (Giờ công): ${gctt_gcong.toFixed(1)}\n` +
                                 `Công FL: ${(gctt_fl_had + gctt_fl_viec).toFixed(1)}\n` +
                                 `Nhân viên thử việc: ${gctt_thuviec.toFixed(1)}\n` +
                                 `Tổng cộng giờ công: ${total_gctt.toFixed(1)}`;

            return {
              gc_leader, gc_nsuat, gc_gcong, gc_thuviec, gc_fl_had, gc_fl_viec,
              gctt_leader, gctt_nsuat, gctt_gcong, gctt_thuviec, gctt_fl_had, gctt_fl_viec,
              tile_leader, tile_nsuat, tile_gcong, tile_thuviec, tile_fl_had, tile_fl_viec,
              total_tns, total_skh, total_sdung, total_gctt, act_don, tile_tong, nang_suat_diem_danh, nang_suat_bao_cao, reportText,
              formatGctt, allHoursText, dapt_dat, dapt_thieu
            };
          }, [inputs, todayStr]);

          const currentWeekHeaders = React.useMemo(() => {
            const baseIndex = 5 + (weekOffset * 7); 
            return allLichHeaders.slice(Math.max(0, baseIndex), baseIndex + 7);
          }, [allLichHeaders, weekOffset]);

          const analytics = React.useMemo(() => {
            const isV = activeTab === 'vi-pham';
            const src = isV ? violationData : bienbanData;
            const filtered = src.filter(item => {
              const dStr = isV ? item.time : item.date;
              if (!dStr || !item.name) return false;
              return item.name.toLowerCase().includes(filterName.toLowerCase()) &&
                     (filterMonth === '' || dStr.includes(`/${filterMonth}/`) || dStr.includes(`-${filterMonth}-`));
            });
            return { filtered };
          }, [activeTab, violationData, bienbanData, filterName, filterMonth]);

          // Hàm tự động co giãn dòng theo chữ nhập vào cho textarea vị trí và ghi chú
          const autoResize = (ev) => {
            ev.target.style.height = 'auto';
            ev.target.style.height = ev.target.scrollHeight + 'px';
          };

          if (isLoading) {
            return e('div', { className: 'flex flex-col items-center justify-center min-h-screen font-bold text-slate-500' },
              e('div', { className: 'w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2' }),
              'Đang đồng bộ hóa cấu hình dữ liệu và bảng tuần biểu...'
            );
          }

          return e('div', { className: 'min-h-screen flex flex-col bg-slate-50' },
            e('header', { className: 'bg-slate-900 text-white p-2 flex justify-between items-center shadow-md' },
              e('h1', { className: 'text-xs font-black tracking-widest text-orange-500' }, 'SORT KTC 01 OPERATIONAL WEB'),
              e('span', { className: 'text-[10px] font-mono bg-slate-800 px-2 py-0.5 rounded text-slate-400' }, 'Màn hình tối ưu gọn | Tách biệt hai cách tính năng suất')
            ),
            e('nav', { className: 'flex bg-white border-b font-bold text-slate-600 text-center text-xs' },
              [['lich-lam-viec', 'Bảng Lịch Toàn Tuần 📅'], ['report-daily', 'Report Daily & Tự Tính 📊'], ['vi-pham', 'Vi Phạm 🔓'], ['bien-ban', 'Biên Bản 🔓']].map(tab => 
                e('button', { key: tab[0], onClick: () => setActiveTab(tab[0]), className: 'flex-1 py-2 border-b-2 ' + (activeTab === tab[0] ? 'border-orange-500 text-orange-600 bg-orange-50/30' : 'border-transparent') }, tab[1])
              )
            ),

            e('main', { className: 'p-2 w-full max-w-[100vw] mx-auto flex-1' },
              
              activeTab === 'lich-lam-viec' && e('div', { className: 'bg-white p-3 rounded border shadow-sm space-y-2' },
                e('div', { className: 'flex justify-between items-center border-b pb-1' },
                  e('h2', { className: 'font-black text-xs text-slate-800' }, 'LỊCH TRỰC BAN TOÀN DIỆN NGUYÊN TUẦN'),
                  e('div', { className: 'flex items-center gap-1 bg-slate-100 p-0.5 rounded border text-[10px]' },
                    e('button', { className: 'px-1.5 py-0.5 rounded hover:bg-white font-bold', onClick: () => setWeekOffset(p => p - 1) }, '◀'),
                    e('button', { className: 'px-1.5 py-0.5 rounded bg-orange-500 text-white font-bold', onClick: () => setWeekOffset(0) }, 'Tuần này'),
                    e('button', { className: 'px-1.5 py-0.5 rounded hover:bg-white font-bold', onClick: () => setWeekOffset(p => p + 1) }, '▶')
                  )
                ),
                e('div', { className: 'overflow-x-auto border rounded' },
                  e('table', { className: 'w-full text-left text-[10px] border-collapse' },
                    e('thead', { className: 'bg-slate-100 font-bold border-b text-center' },
                      e('tr', null,
                        e('th', { className: 'p-1.5 border-r w-20 text-left' }, 'Nhân Viên'),
                        currentWeekHeaders.map(h => e('th', { key: h.index, className: 'p-1.5 border-r bg-slate-50 min-w-[80px]' }, `${h.dayStr}\n(${h.dateStr})`))
                      )
                    ),
                    e('tbody', null, lichRows.map((row, idx) => e('tr', { key: idx, className: 'border-t hover:bg-slate-50' },
                      e('td', { className: 'p-1.5 border-r font-bold text-slate-900 bg-slate-50/50' }, row.name),
                      currentWeekHeaders.map(h => {
                        const cell = row.rawRow[h.index] || 'OFF';
                        return e('td', { key: h.index, className: 'p-1 border-r text-center font-medium ' + (cell === 'OFF' ? 'bg-yellow-50 text-yellow-700' : 'text-slate-800') }, cell);
                      })
                    )))
                  )
                )
              ),

              activeTab === 'report-daily' && e('div', { className: 'space-y-2' },
                e('div', { className: 'bg-white rounded border shadow w-full' },
                  e('div', { className: 'overflow-x-auto w-full' },
                    e('table', { className: 'w-full border-collapse text-center text-[10px] bg-white text-black min-w-[900px]' },
                      e('thead', null, 
                        e('tr', { className: 'bg-orange-500 text-white text-center' }, 
                          e('th', { colSpan: 11, className: 'p-1.5 text-xs font-black tracking-widest uppercase text-center' }, 'ĐIỂM DANH SORT KTC 01'),
                          e('th', { colSpan: 3, className: 'p-1.5 text-xs font-black border-l border-orange-400 font-mono tracking-wider text-center' }, todayStr)
                        ),
                        e('tr', { className: 'bg-orange-500 text-white font-bold border-t border-orange-400 text-[9px] leading-tight text-center' }, 
                          [
                            { name: 'Ca làm việc', w: 'w-[65px]' },
                            { name: 'Giờ vào', w: 'w-[40px]' },
                            { name: 'Giờ ra', w: 'w-[40px]' },
                            { name: 'Vị trí', w: 'w-[130px]' },
                            { name: 'Giờ Công', w: 'w-[45px]' },
                            { name: 'Tổng Nhân Sự', w: 'w-[30px]' },
                            { name: 'Số Kế Hoạch', w: 'w-[30px]' },
                            { name: 'Số Đáp Ứng', w: 'w-[40px]' },
                            { name: 'Giờ Công Thực Tế', w: 'w-[40px]' },
                            { name: 'Bù-Trừ', w: 'w-[35px]' },
                            { name: 'Ghi Chú', w: 'w-auto' },
                            { name: 'Tỉ Lệ', w: 'w-[40px]' },
                            { name: 'Đáp Ứng Đạt', w: 'w-[40px]' },
                            { name: 'Đáp Ứng Thiếu', w: 'w-[40px]' }
                          ].map((h, i) => e('th', { key: i, className: `p-1 border border-orange-400 text-center ${h.w}` }, h.name))
                        )
                      ),
                      e('tbody', { className: 'font-medium bg-white text-black text-center' },
                        [
                          { id: 'leader', vt: 'vt_leader', v: 'v_leader', r: 'r_leader', tns: 'tns_leader', skh: 'skh_leader', sd: 'sdung_leader', note: 'note_leader', gc: computed.gc_leader, gctt: computed.gctt_leader, tl: computed.tile_leader },
                          { id: 'nsuat', vt: 'vt_nsuat', v: 'v_nsuat', r: 'r_nsuat', tns: 'tns_nsuat', skh: 'skh_nsuat', sd: 'sdung_nsuat', note: 'note_nsuat', gc: computed.gc_nsuat, gctt: computed.gctt_nsuat, tl: computed.tile_nsuat },
                          { id: 'gcong', vt: 'vt_gcong', v: 'v_gcong', r: 'r_gcong', tns: 'tns_gcong', skh: 'skh_gcong', sd: 'sdung_gcong', note: 'note_gcong', gc: computed.gc_gcong, gctt: computed.gctt_gcong, tl: computed.tile_gcong },
                          { id: 'thuviec', vt: 'vt_thuviec', v: 'v_thuviec', r: 'r_thuviec', tns: 'tns_thuviec', skh: 'skh_thuviec', sd: 'sdung_thuviec', note: 'note_thuviec', gc: computed.gc_thuviec, gctt: computed.gctt_thuviec, tl: computed.tile_thuviec },
                          { id: 'fl_had', vt: 'vt_fl_had', v: 'v_fl_had', r: 'r_fl_had', tns: 'tns_fl_had', skh: 'skh_fl_had', sd: 'sdung_fl_had', note: 'note_fl_had', gc: computed.gc_fl_had, gctt: computed.gctt_fl_had, tl: computed.tile_fl_had },
                          { id: 'fl_viec', vt: 'vt_fl_viec', v: 'v_fl_viec', r: 'r_fl_viec', tns: 'tns_fl_viec', skh: 'skh_fl_viec', sd: 'sdung_fl_viec', note: 'note_fl_viec', gc: computed.gc_fl_viec, gctt: computed.gctt_fl_viec, tl: computed.tile_fl_viec }
                        ].map((row, idx) => e('tr', { key: row.id, className: 'hover:bg-slate-50 border-t border-slate-200 text-center' },
                          idx === 0 && e('td', { rowSpan: 6, className: 'border p-1 font-bold text-center text-[10px]' }, '07:00-16:00'),
