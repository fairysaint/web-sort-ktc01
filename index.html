<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điều Hành Sort KTC 01 - Live Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script>
        // Cấu hình Base ID gốc từ link của bạn
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9Dr7VQeqSwvvbv0HCypWct2ygmiDh4wsWmBm-n7XZCeIMPuOAtePGf2w1KNPv_d7G3b6lQiCQnIMv/pub?output=csv";
        
        // TÁCH LINK THEO TỪNG SHEET CHÍNH XÁC (Thay đổi số gid nếu cấu hình sheet của bạn có ID khác)
        const URL_LICH_LAM_VIEC = BASE_URL + "&gid=0"; 
        const URL_VI_PHAM        = BASE_URL + "&gid=1355152068"; // ID ví dụ của trang Vi Phạm, nếu lỗi hãy giữ nguyên BASE_URL nếu nó nằm ở sheet đầu tiên
        const URL_BIEN_BAN       = BASE_URL + "&gid=1864197994"; // ID ví dụ của trang Biên Bản

        const e = React.createElement;

        // Bộ phân tách dữ liệu CSV
        function parseCSV(text) {
          if (!text) return [];
          let lines = text.split(/\r\n|\n/);
          return lines.map(line => {
            let result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
              let char = line[i];
              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
              } else {
                current += char;
              }
            }
            result.push(current.trim());
            return result;
          }).filter(row => row.length > 0 && row[0] !== '');
        }

        function App() {
          const [activeTab, setActiveTab] = React.useState('lich-lam-viec');
          const [isLoggedIn, setIsLoggedIn] = React.useState(false);
          const [username, setUsername] = React.useState('');
          const [password, setPassword] = React.useState('');
          const [filterName, setFilterName] = React.useState('');
          const [filterMonth, setFilterMonth] = React.useState('');
          
          const [staffData, setStaffData] = React.useState([]);
          const [violationData, setViolationData] = React.useState([]);
          const [bienbanData, setBienbanData] = React.useState([]);
          const [isLoading, setIsLoading] = React.useState(true);

          const [reportInputs, setReportInputs] = React.useState({
            i3: 24, i4: 263.5, i5: 19, i6: 0, e14: 19701, e15: 37422, e16: 1200, k12: 58323, f10: 410.5,
            h4: 31, g4: 40, h5: 2, g5: 2, g7: 5, g8: 10, h7: 5, h8: 8
          });

          React.useEffect(() => {
            async function loadAllSheets() {
              try {
                setIsLoading(true);

                // Gọi đồng thời hoặc tuần tự các URL để tránh nhầm dòng dữ liệu chéo nhau
                // TAB 1: Tải Lịch Làm Việc (Giả định nằm ở Sheet đầu tiên hoặc GID chỉ định)
                const resStaff = await fetch(URL_LICH_LAM_VIEC).catch(() => fetch(BASE_URL));
                const textStaff = await resStaff.text();
                const rowsStaff = parseCSV(textStaff);
                
                let tempStaff = [];
                rowsStaff.forEach((row, idx) => {
                  if (idx === 0) return;
                  // Map chính xác cột dữ liệu lịch làm việc (Họ tên: cột D[3] hoặc C[2] tùy cấu hình thực tế)
                  if (row[3] || row[2] || row[1]) {
                    tempStaff.push({
                      id: idx,
                      name: row[3] || row[2] || row[1],
                      role: row[4] || row[3] || "Nhân viên",
                      shift: row[5] || "Theo Ca",
                      status: row[6] || "Active"
                    });
                  }
                });

                // TAB 3: Tải dữ liệu Vi Phạm (Cố gắng fetch link chuyên biệt, nếu không có thì lấy luồng phụ)
                const resViolation = await fetch(URL_VI_PHAM).catch(() => fetch(BASE_URL));
                const textViolation = await resViolation.text();
                const rowsViolation = parseCSV(textViolation);
                
                let tempViolation = [];
                rowsViolation.forEach((row, idx) => {
                  if (idx === 0) return;
                  // Chỉ lấy nếu dòng có chứa thông tin vi phạm đặc trưng
                  if (row[2] && row[1]) {
                    tempViolation.push({
                      id: idx,
                      time: row[0],
                      code: row[1],
                      name: row[2],
                      error: row[3] || "Lỗi vận hành",
                      userId: row[4] || "KTC_ID"
                    });
                  }
                });

                // TAB 4: Tải dữ liệu Biên Bản
                const resBienBan = await fetch(URL_BIEN_BAN).catch(() => fetch(BASE_URL));
                const textBienBan = await resBienBan.text();
                const rowsBienBan = parseCSV(textBienBan);
                
                let tempBienBan = [];
                rowsBienBan.forEach((row, idx) => {
                  if (idx === 0) return;
                  if (row[9] || row[7]) {
                    tempBienBan.push({
                      id: idx,
                      date: row[7] || row[0],
                      username: row[8] || "N/A",
                      name: row[9] || row[2],
                      content: row[10] || row[3],
                      userId: row[11] || "KTC_ID"
                    });
                  }
                });

                setStaffData(tempStaff);
                setViolationData(tempViolation);
                setBienbanData(tempBienBan);
                setIsLoading(false);

              } catch (error) {
                console.error("Lỗi phân tách luồng dữ liệu riêng biệt:", error);
                setIsLoading(false);
              }
            }
            loadAllSheets();
          }, []);

          const handleNumChange = (key, val) => {
            setReportInputs(prev => {
              const next = Object.assign({}, prev);
              next[key] = parseFloat(val) || 0;
              return next;
            });
          };

          const computedValues = React.useMemo(() => {
            return {
              L15: reportInputs.i3, L16: reportInputs.i4, L17: reportInputs.i5,
              L18: (reportInputs.g7 || 0) + (reportInputs.g8 || 0), L19: reportInputs.i6,
              Q6: reportInputs.e14 + reportInputs.e15 + reportInputs.e16,
              R8: reportInputs.h4 + "/" + reportInputs.g4, R9: reportInputs.h5 + "/" + reportInputs.g5,
              L12: reportInputs.f10 > 0 ? (reportInputs.k12 / reportInputs.f10).toFixed(2) : 0
            };
          }, [reportInputs]);

          const processedData = React.useMemo(() => {
            const raw = activeTab === 'vi-pham' ? violationData : bienbanData;
            const filtered = raw.filter(item => {
              const d = item.time || item.date;
              const nameMatch = item.name ? item.name.toLowerCase().indexOf(filterName.toLowerCase()) !== -1 : false;
              const monthMatch = filterMonth === '' || (d && d.indexOf("-" + filterMonth + "-") !== -1);
              return nameMatch && monthMatch;
            });
            const individualCounts = {};
            filtered.forEach(item => { if(item.name) individualCounts[item.name] = (individualCounts[item.name] || 0) + 1; });
            return { filtered: filtered, individualCounts: individualCounts };
          }, [activeTab, violationData, bienbanData, filterName, filterMonth]);

          if (isLoading) {
            return e('div', { className: 'text-center py-20 text-sm font-medium text-slate-500' },
              e('div', { className: 'w-6 h-6 border-2 border-orange-600 border-t-transparent rounded-full animate-spin mx-auto mb-2' }),
              'Đang bóc tách luồng dữ liệu riêng biệt từ Google Sheet...'
            );
          }

          const loginView = e('div', { className: 'max-w-sm mx-auto bg-white p-6 rounded-2xl shadow border border-slate-200 my-16 text-xs' },
            e('div', { className: 'text-center mb-4' }, e('span', { className: 'text-2xl' }, '🔒'), e('h3', { className: 'font-bold text-slate-800 uppercase mt-2' }, 'Yêu Cầu Xác Thực Quy Trình')),
            e('div', { className: 'space-y-3' },
              e('input', { type: 'text', placeholder: 'Tên đăng nhập (admin)', className: 'w-full p-2.5 border rounded-lg outline-none', value: username, onChange: ev => setUsername(ev.target.value) }),
              e('input', { type: 'password', placeholder: 'Mật khẩu (123456)', className: 'w-full p-2.5 border rounded-lg outline-none', value: password, onChange: ev => setPassword(ev.target.value) }),
              e('button', { className: 'w-full bg-slate-900 text-white py-2.5 rounded-lg font-bold uppercase', onClick: () => username === 'admin' && password === '123456' ? setIsLoggedIn(true) : alert('Sai thông tin!') }, 'Xác Thực')
            )
          );

          return e('div', { className: 'min-h-screen flex flex-col font-sans' },
            e('header', { className: 'bg-gradient-to-r from-orange-600 to-amber-600 text-white p-5 shadow flex justify-between items-center' },
              e('div', null, e('h1', { className: 'text-xl font-bold' }, 'HỆ THỐNG ĐIỀU HÀNH WEB - SORT KTC 01'), e('p', { className: 'text-xs opacity-90' }, '● Đang đồng bộ hóa độc lập đa biểu mẫu (Multi-Sheet Active)')),
              isLoggedIn && e('button', { className: 'bg-orange-800 text-white px-3 py-1.5 rounded-lg text-xs font-bold', onClick: () => setIsLoggedIn(false) }, 'Đăng xuất 🔓')
            ),
            e('nav', { className: 'flex bg-white border-b sticky top-0 z-40' },
              [['lich-lam-viec', 'Lịch Làm Việc 🔒'], ['report-daily', 'Report Daily 🔒'], ['vi-pham', 'Vi Phạm 🔓'], ['bien-ban', 'Biên Bản 🔓']].map(tab => 
                e('button', { key: tab[0], onClick: () => setActiveTab(tab[0]), className: 'flex-1 text-center py-4 text-xs font-bold border-b-4 ' + (activeTab === tab[0] ? 'border-orange-600 bg-orange-50 text-orange-700' : 'border-transparent text-slate-500') }, tab[1])
              )
            ),
            e('main', { className: 'p-4 md:p-6 max-w-7xl mx-auto w-full flex-1' },
              ((activeTab === 'lich-lam-viec' || activeTab === 'report-daily') && !isLoggedIn) ? loginView : e('div', null,
                activeTab === 'lich-lam-viec' && e('div', { className: 'bg-white p-5 rounded-xl shadow border' },
                  e('h2', { className: 'font-bold text-sm mb-3 border-l-4 border-orange-500 pl-2' }, 'LỊCH LÀM VIỆC - DỮ LIỆU ĐỒNG BỘ CHUẨN KHU VỰC'),
                  e('div', { className: 'overflow-x-auto' },
                    e('table', { className: 'w-full text-xs border' },
                      e('thead', null, e('tr', { className: 'bg-slate-100 font-bold' }, e('th', { className: 'p-2 border text-left' }, 'Nhân Sự Vận Hành'), e('th', { className: 'p-2 border text-left' }, 'Vị Trí'), e('th', { className: 'p-2 border text-left' }, 'Khung Giờ Ca'), e('th', { className: 'p-2 border text-left' }, 'Trạng Thái'))),
                      e('tbody', null, 
                        staffData.length === 0 ? e('tr', null, e('td', { colSpan: 4, className: 'p-4 text-center text-slate-400' }, 'Không tìm thấy dòng dữ liệu phù hợp tại Sheet này.')) :
                        staffData.map(p => e('tr', { key: p.id, className: 'hover:bg-slate-50' }, e('td', { className: 'p-2 border font-bold' }, p.name), e('td', { className: 'p-2 border text-slate-600' }, p.role), e('td', { className: 'p-2 border font-mono text-slate-500' }, p.shift), e('td', { className: 'p-2 border' }, e('span', { className: 'bg-green-100 text-green-800 text-[10px] px-2 py-0.5 rounded-full font-bold' }, p.status)))),
                        e('tr', { className: 'bg-amber-50 text-center font-bold text-amber-800 text-[10px]' }, e('td', { colSpan: 4, className: 'p-3 border uppercase' }, '🛑 Dữ liệu tự động phân loại độc lập theo luồng cấu hình'))
                      )
                    )
                  )
                ),
                activeTab === 'report-daily' && e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-5 text-xs' },
                  e('div', { className: 'bg-white p-5 rounded-xl shadow border space-y-3' },
                    e('h3', { className: 'font-bold text-blue-600 uppercase border-b pb-2' }, 'Khu Vực Điền Chỉ Số Ca Trực (Input)'),
                    e('div', { className: 'grid grid-cols-2 gap-3' },
                      ['i3', 'Công Leader (I3)', 'i4', 'Công NV Năng suất (I4)', 'e14', 'Sản lượng CBS 1 (E14)', 'e15', 'Sản lượng CBS 2 (E15)'].map((label, idx, arr) => 
                        idx % 2 === 0 ? e('div', { key: label }, arr[idx+1] + ': ', e('input', { type: 'number', className: 'w-full p-2 border rounded mt-1', value: reportInputs[label], onChange: ev => handleNumChange(label, ev.target.value) })) : null
                      )
                    )
                  ),
                  e('div', { className: 'bg-white p-5 rounded-xl shadow border flex flex-col justify-between' },
                    e('div', null,
                      e('h3', { className: 'font-bold text-orange-600 uppercase border-b pb-2' }, 'Bảng Tính Toán Đầu Ra Biểu Mẫu (Output)'),
                      e('div', { className: 'space-y-2.5 bg-slate-50 p-3 rounded-lg border mt-3 font-medium' },
                        e('div', { className: 'flex justify-between' }, e('span', null, 'Tổng sản lượng xử lý (Q6):'), e('span', { className: 'font-bold text-blue-700' }, computedValues.Q6.toLocaleString() + ' đơn')),
                        e('div', { className: 'flex justify-between' }, e('span', null, 'Năng suất đơn/giờ công (L12):'), e('span', { className: 'font-bold text-green-700' }, computedValues.L12 + ' đơn/h')),
                        e('div', { className: 'flex justify-between' }, e('span', null, 'Tỷ lệ đáp ứng thực tế (R8):'), e('span', { className: 'font-bold font-mono' }, computedValues.R8))
                      )
                    ),
                    e('div', { className: 'text-[10px] font-mono text-slate-400 border-t pt-2 mt-4' }, 'Dải đếm công tự động: L15=' + computedValues.L15 + ' | L16=' + computedValues.L16)
                  )
                ),
                (activeTab === 'vi-pham' || activeTab === 'bien-ban') && e('div', { className: 'space-y-4' },
                  e('div', { className: 'bg-white p-4 rounded-xl shadow border flex justify-between flex-wrap gap-3 items-center text-xs' },
                    e('span', { className: 'font-bold text-emerald-700' }, '🔓 Không gian công khai bộ lọc Real-time'),
                    e('div', { className: 'flex gap-2 w-full sm:w-auto' },
                      e('input', { type: 'text', placeholder: 'Tìm theo tên...', className: 'p-2 border rounded-lg w-full sm:w-48 outline-none focus:border-orange-500', value: filterName, onChange: ev => setFilterName(ev.target.value) }),
                      e('select', { className: 'p-2 border rounded-lg bg-white outline-none', value: filterMonth, onChange: ev => setFilterMonth(ev.target.value) },
                        e('option', { value: '' }, 'Tất cả các tháng'), e('option', { value: '05' }, 'Tháng 05'), e('option', { value: '06' }, 'Tháng 06')
                      )
                    )
                  ),
                  e('div', { className: 'bg-white p-4 rounded-xl shadow border text-xs' },
                    e('h4', { className: 'font-bold text-slate-500 mb-2 uppercase' }, 'Tần suất xuất hiện theo bộ lọc:'),
                    e('div', { className: 'flex flex-wrap gap-2' },
                      Object.entries(processedData.individualCounts).map(entry => e('span', { key: entry[0], className: 'bg-slate-50 border px-2.5 py-1 rounded text-slate-800' }, e('strong', null, entry[0]), ': ', e('strong', { className: 'text-red-600' }, entry[1] + ' lần')))
                    )
                  ),
                  e('div', { className: 'bg-white rounded-xl shadow overflow-hidden border' },
                    e('div', { className: 'overflow-x-auto' },
                      e('table', { className: 'w-full text-left text-xs border-collapse' },
                        e('thead', { className: 'bg-slate-50 font-bold text-[10px] text-slate-600 uppercase' }, e('tr', null, e('th', { className: 'p-3 border-b' }, 'Thời Gian'), e('th', { className: 'p-3 border-b' }, 'Họ Tên'), e('th', { className: 'p-3 border-b' }, 'Nội Dung Sự Việc / Lỗi Vi Phạm'), e('th', { className: 'p-3 border-b' }, 'User ID'))),
                        e('tbody', { className: 'divide-y' },
                          processedData.filtered.length === 0 ? e('tr', null, e('td', { colSpan: 4, className: 'p-4 text-center text-slate-400' }, 'Không tìm thấy dữ liệu phù hợp.')) :
                          processedData.filtered.map(item => e('tr', { key: item.id, className: 'hover:bg-slate-50/80' }, e('td', { className: 'p-3 text-slate-500 font-mono' }, item.time || item.date), e('td', { className: 'p-3 font-bold text-slate-900' }, item.name), e('td', { className: 'p-3 text-red-600 font-semibold' }, item.error || item.content), e('td', { className: 'p-3 text-slate-400 font-mono' }, item.userId)))
                        )
                      )
                    )
                  )
                )
              )
            )
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
