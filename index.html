<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điều Hành Sort KTC 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <style>
        .auto-height { overflow: hidden; height: auto; resize: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 text-[11px]">

    <div id="root"></div>

    <script>
        const SPREADSHEET_ID = "2PACX-1vR9Dr7VQeqSwvvbv0HCypWct2ygmiDh4wsWmBm-n7XZCeIMPuOAtePGf2w1KNPv_d7G3b6lQiCQnIMv";
        
        const URL_LICH_LAM_VIEC = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=594239313&output=csv`;
        const URL_VI_PHAM       = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=0&output=csv`;
        const URL_BIEN_BAN      = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=735999237&output=csv`;

        const e = React.createElement;

        function parseCSV(text) {
          if (!text) return [];
          let lines = text.split(/\r\n|\n/);
          return lines.map(line => {
            let result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
              let char = line[i];
              if (char === '"') { inQuotes = !inQuotes; }
              else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
              else { current += char; }
            }
            result.push(current.trim());
            return result;
          }).filter(row => row.length > 0);
        }

        function timeToHours(tStr) {
          if (!tStr || !tStr.includes(':')) return 0;
          const [h, m] = tStr.split(':').map(Number);
          return h + (m / 60);
        }

        function getTodayString() {
          const today = new Date();
          const dd = String(today.getDate()).padStart(2, '0');
          const mm = String(today.getMonth() + 1).padStart(2, '0');
          const yyyy = today.getFullYear();
          return `${dd}/${mm}/${yyyy}`;
        }

        function parseDateDetails(dateStr) {
          if (!dateStr) return { day: null, month: null, rawDate: "" };
          let cleanStr = dateStr.split(' ')[0];
          let parts = [];
          if (cleanStr.includes('/')) parts = cleanStr.split('/');
          else if (cleanStr.includes('-')) parts = cleanStr.split('-');
          
          if (parts.length >= 2) {
            let d = parts[0].length <= 2 ? parseInt(parts[0], 10) : parseInt(parts[2], 10);
            let m = parseInt(parts[1], 10);
            let y = parts[0].length > 2 ? parseInt(parts[0], 10) : parseInt(parts[2], 10);
            
            let dStr = String(d).padStart(2, '0') + '/' + String(m).padStart(2, '0');
            return { day: d, month: m, rawDate: dStr };
          }
          return { day: null, month: null, rawDate: dateStr };
        }

        function App() {
          const [activeTab, setActiveTab] = React.useState('report-daily');
          const [filterName, setFilterName] = React.useState('');
          const [filterMonth, setFilterMonth] = React.useState('');

          const [allLichHeaders, setAllLichHeaders] = React.useState([]); 
          const [lichRows, setLichRows] = React.useState([]);       
          const [weekOffset, setWeekOffset] = React.useState(0); 

          const [violationData, setViolationData] = React.useState([]);
          const [bienbanData, setBienbanData] = React.useState([]);
          const [isLoading, setIsLoading] = React.useState(true);

          const todayStr = React.useMemo(() => getTodayString(), []);

          const [inputs, setInputs] = React.useState({
            vt_leader: 'Leader', v_leader: '07:30', r_leader: '16:30', tns_leader: 3, skh_leader: 3, sdung_leader: 3, note_leader: '',
            vt_nsuat: 'NV Năng suất', v_nsuat: '07:00', r_nsuat: '16:30', tns_nsuat: 40, skh_nsuat: 31, sdung_nsuat: 31, note_nsuat: '1 nhân viên off bệnh',
            vt_gcong: 'NV Giờ công', v_gcong: '07:00', r_gcong: '17:30', tns_gcong: 2, skh_gcong: 2, sdung_gcong: 2, note_gcong: '',
            vt_thuviec: 'Nhân viên thử việc', v_thuviec: '07:30', r_thuviec: '16:30', tns_thuviec: 0, skh_thuviec: 0, sdung_thuviec: 0, note_thuviec: '',
            vt_fl_had: 'FL - Hoa Anh Đào', v_fl_had: '08:00', r_fl_had: '17:00', tns_fl_had: 0, skh_fl_had: 0, sdung_fl_had: 0, note_fl_had: '',
            vt_fl_viec: 'FL - Viecco', v_fl_viec: '08:00', r_fl_viec: '17:00', tns_fl_viec: 0, skh_fl_viec: 0, sdung_fl_viec: 0, note_fl_viec: '',
            feeder_cbs1: 19701, feeder_cbs2: 37422, tron_lan: 1000, forecast: 65000,
            hang_cho_ra: 2990, hang_cho_xuat: 40892, hang_lien_vung: 0, hang_noi_vung: 0,
            phat_sinh: 'Không'
          });

          React.useEffect(() => {
            async function loadAllData() {
              try {
                setIsLoading(true);
                const resLich = await fetch(URL_LICH_LAM_VIEC);
                const rawLich = parseCSV(await resLich.text());
                
                if (rawLich.length > 4) {
                  let dates = rawLich[2] || [];
                  let days = rawLich[3] || [];
                  let headers = [];
                  for(let colIdx = 4; colIdx < dates.length; colIdx++) {
                    if (dates[colIdx]) {
                      headers.push({ index: colIdx, dateStr: dates[colIdx], dayStr: days[colIdx] || '' });
                    }
                  }
                  setAllLichHeaders(headers);

                  let parsedStaff = [];
                  for (let i = 4; i < rawLich.length; i++) {
                    const row = rawLich[i];
                    if (row[3] && (row[3].includes("Tổng") || row[3].includes("Nhóm"))) break;
                    if (row[3]) {
                      parsedStaff.push({ gioitinh: row[0] || '', stt: row[1] || '', msnv: row[2] || '', name: row[3], rawRow: row });
                    }
                  }
                  setLichRows(parsedStaff);
                }

                const resVi = await fetch(URL_VI_PHAM);
                const rowsVi = parseCSV(await resVi.text());
                let parsedVi = [];
                rowsVi.forEach((row, idx) => {
                  if (idx > 0 && row[2]) {
                    const dateInfo = parseDateDetails(row[0]);
                    if (dateInfo.month && dateInfo.month >= 5) {
                      parsedVi.push({ id: idx, time: row[0], code: row[1], name: row[2], error: row[3], userId: row[4], reporter: row[5], dateInfo });
                    }
                  }
                });
                setViolationData(parsedVi);

                const resBb = await fetch(URL_BIEN_BAN);
                const rowsBb = parseCSV(await resBb.text());
                let parsedBb = [];
                rowsBb.forEach((row, idx) => {
                  if (idx > 0 && row[2]) {
                    const dateInfo = parseDateDetails(row[0]);
                    if (dateInfo.month && dateInfo.month >= 5) {
                      parsedBb.push({ id: idx, date: row[0], username: row[1], name: row[2], content: row[3], userId: row[4], creator: row[5], image: row[6], dateInfo });
                    }
                  }
                });
                setBienbanData(parsedBb);
                setIsLoading(false);
              } catch (err) {
                console.error(err);
                setIsLoading(false);
              }
            }
            loadAllData();
          }, []);

          const handleInputChange = (key, value, isNum = false) => {
            setInputs(p => ({ ...p, [key]: isNum ? (parseFloat(value) || 0) : value }));
          };

          const copyToClipboard = (text, message) => {
            navigator.clipboard.writeText(text);
            alert(message);
          };

          const computed = React.useMemo(() => {
            const i = inputs;
            const calcGc = (v, r) => { const diff = timeToHours(r) - timeToHours(v); return diff > 1 ? diff - 1 : 0; };
            const gc_leader = calcGc(i.v_leader, i.r_leader);
            const gc_nsuat = calcGc(i.v_nsuat, i.r_nsuat);
            const gc_gcong = calcGc(i.v_gcong, i.r_gcong);
            const gc_thuviec = calcGc(i.v_thuviec, i.r_thuviec);
            const gc_fl_had = calcGc(i.v_fl_had, i.r_fl_had);
            const gc_fl_viec = calcGc(i.v_fl_viec, i.r_fl_viec);

            const gctt_leader = gc_leader * i.sdung_leader;
            const gctt_nsuat = gc_nsuat * i.sdung_nsuat;
            const gctt_gcong = gc_gcong * i.sdung_gcong;
            const gctt_thuviec = gc_thuviec * i.sdung_thuviec;
            const gctt_fl_had = gc_fl_had * i.sdung_fl_had;
            const gctt_fl_viec = gc_fl_viec * i.sdung_fl_viec;

            const total_tns = i.tns_leader + i.tns_nsuat + i.tns_gcong + i.tns_thuviec + i.tns_fl_had + i.tns_fl_viec;
            const total_skh = i.skh_leader + i.skh_nsuat + i.skh_gcong + i.skh_thuviec + i.skh_fl_had + i.skh_fl_viec;
            const total_sdung = i.sdung_leader + i.sdung_nsuat + i.sdung_gcong + i.sdung_thuviec + i.sdung_fl_had + i.sdung_fl_viec;
            const total_gctt = gctt_leader + gctt_nsuat + gctt_gcong + gctt_thuviec + gctt_fl_had + gctt_fl_viec;
            const act_don = i.feeder_cbs1 + i.feeder_cbs2 + i.tron_lan;
            
            // Khai báo đầy đủ các biến tỉ lệ đáp ứng tránh lỗi ReferenceError
            const tile_leader = i.skh_leader > 0 ? Math.round((i.sdung_leader / i.skh_leader) * 100) : 0;
            const tile_nsuat = i.skh_nsuat > 0 ? Math.round((i.sdung_nsuat / i.skh_nsuat) * 100) : 0;
            const tile_gcong = i.skh_gcong > 0 ? Math.round((i.sdung_gcong / i.skh_gcong) * 100) : 0;
            const tile_thuviec = i.skh_thuviec > 0 ? Math.round((i.sdung_thuviec / i.skh_thuviec) * 100) : 0;
            const tile_fl_had = i.skh_fl_had > 0 ? Math.round((i.sdung_fl_had / i.skh_fl_had) * 100) : 0;
            const tile_fl_viec = i.skh_fl_viec > 0 ? Math.round((i.sdung_fl_viec / i.skh_fl_viec) * 100) : 0;

            const total_fl_skh = i.skh_fl_had + i.skh_fl_viec;
            const total_fl_sdung = i.sdung_fl_had + i.sdung_fl_viec;
            const tile_fl = total_fl_skh > 0 ? Math.round((total_fl_sdung / total_fl_skh) * 100) : 0;
            const tile_tong = total_skh > 0 ? Math.round((total_sdung / total_skh) * 100) : 0;
            const nang_suat_bao_cao = total_gctt > 0 ? Math.round(act_don / total_gctt) : 0;

            const reportText = `${todayStr}\nBáo cáo cuối ca Sort (07:30-16:30) KTC HCM 01\n\n1/ Lượng hàng.\na. Forecast (đơn):${i.forecast.toLocaleString()}\nb. Act (đơn):${act_don.toLocaleString()}\n\n2/ Nhân sự.\na. Nhân viên năng suất:${tile_nsuat}% ${i.sdung_nsuat}/${i.skh_nsuat}\nb. Nhân viên giờ công:${tile_gcong}% ${i.sdung_gcong}/${i.skh_gcong}\nc. Freelancer:${tile_fl}% ${total_fl_sdung}/${total_fl_skh}\nTổng đáp ứng nhân sự:${tile_tong}%\n\n3/ Năng suất:${nang_suat_bao_cao}đơn/h\n\n4/ Hàng hóa:\nData ghi nhận :${todayStr} 16:30:00\na. Hàng nhận chờ rã (đơn):${i.hang_cho_ra}đơn\n-Hàng liên vùng trước mốc bàn giao 15:00:${i.hang_lien_vung}đơn\n-Hàng nội vùng trước mốc bàn giao 16:00:${i.hang_noi_vung}đơn\nb. Hàng sort đã xử lý:\n- Trạng thái khởi tạo chờ xuất ${i.hang_cho_xuat}đơn\n\n5/ Phát sinh trong ca:\n- ${i.phat_sinh}`;
            const allHoursNumbersOnly = `${gctt_leader.toFixed(1).replace('.', ',')}\n${gctt_nsuat.toFixed(1).replace('.', ',')}\n${gctt_gcong.toFixed(1).replace('.', ',')}\n${(gctt_fl_had + gctt_fl_viec).toFixed(1).replace('.', ',')}`;

            return {
              gc_leader, gc_nsuat, gc_gcong, gc_thuviec, gc_fl_had, gc_fl_viec,
              gctt_leader, gctt_nsuat, gctt_gcong, gctt_thuviec, gctt_fl_had, gctt_fl_viec,
              tile_leader, tile_nsuat, tile_gcong, tile_thuviec, tile_fl_had, tile_fl_viec,
              total_tns, total_skh, total_sdung, total_gctt, act_don, tile_tong, nang_suat_diem_danh: total_gctt > 0 ? Math.round(i.forecast / total_gctt) : 0, nang_suat_bao_cao, reportText,
              formatGctt: (val) => val.toFixed(1).replace('.', ','), allHoursNumbersOnly, dapt_dat: tile_tong >= 100 ? 100 : tile_tong, dapt_thieu: tile_tong >= 100 ? 0 : (100 - tile_tong)
            };
          }, [inputs, todayStr]);

          const currentWeekHeaders = React.useMemo(() => {
            const baseIndex = 5 + (weekOffset * 7); return allLichHeaders.slice(Math.max(0, baseIndex), baseIndex + 7);
          }, [allLichHeaders, weekOffset]);

          const filteredRawData = React.useMemo(() => {
            const isV = activeTab === 'vi-pham';
            const src = isV ? violationData : bienbanData;
            return src.filter(item => {
              const m = item.dateInfo.month;
              const matchMonth = filterMonth === '' || (m !== null && m === parseInt(filterMonth, 10));
              const matchName = item.name.toLowerCase().includes(filterName.toLowerCase());
              return matchMonth && matchName;
            });
          }, [activeTab, violationData, bienbanData, filterName, filterMonth]);

          const textAnalysisInsight = React.useMemo(() => {
            if (activeTab !== 'vi-pham' && activeTab !== 'bien-ban') return "";
            
            const isV = activeTab === 'vi-pham';
            const titleStr = isV ? "Lỗi Vi Phạm" : "Biên Bản Quy Trình";
            const currentSrc = isV ? violationData : bienbanData;

            const matchedWithNameSrc = currentSrc.filter(x => x.name.toLowerCase().includes(filterName.toLowerCase()));
            
            if (matchedWithNameSrc.length === 0) {
              return `Hệ thống ghi nhận không có dữ liệu ${titleStr} nào từ tháng 5 trở đi phù hợp với từ khóa tìm kiếm "${filterName}".`;
            }

            if (filterMonth === '') {
              const monthCounts = {};
              for (let m = 5; m <= 12; m++) monthCounts[m] = 0;
              
              matchedWithNameSrc.forEach(item => {
                if (item.dateInfo.month >= 5 && item.dateInfo.month <= 12) {
                  monthCounts[item.dateInfo.month]++;
                }
              });

              let maxMonth = 5, minMonth = 5;
              let maxVal = -1, minVal = 999999;
              let validDataCount = 0;

              for (let m = 5; m <= 12; m++) {
                const count = monthCounts[m];
                validDataCount += count;
                if (count > maxVal) { maxVal = count; maxMonth = m; }
                if (count < minVal) { minVal = count; minMonth = m; }
              }

              let insightText = `📌 [ĐÁNH GIÁ CHUNG TỪ THÁNG 5 TRỞ ĐI]: Tổng số ghi nhận là ${validDataCount} trường hợp ${titleStr.toLowerCase()}. `;
              if (validDataCount > 0) {
                insightText += `Trong đó, tháng có số lượng vi phạm CAO NHẤT là Tháng ${maxMonth} với ${maxVal} trường hợp. `;
                insightText += `Tháng có số lượng vi phạm THẤP NHẤT là Tháng ${minMonth} với ${minVal} trường hợp.`;
              } else {
                insightText += `Hiện chưa phát sinh dữ liệu lỗi trong giai đoạn này.`;
              }
              return insightText;

            } else {
              const selectedM = parseInt(filterMonth, 10);
              const monthSpecificSrc = matchedWithNameSrc.filter(x => x.dateInfo.month === selectedM);
              
              if (monthSpecificSrc.length === 0) {
                return `📌 [ĐÁNH GIÁ THÁNG ${selectedM}]: Hệ thống không ghi nhận bất kỳ trường hợp ${titleStr.toLowerCase()} nào phát sinh trong tháng này.`;
              }

              const dayCounts = {};
              monthSpecificSrc.forEach(item => {
                const rDate = item.dateInfo.rawDate;
                dayCounts[rDate] = (dayCounts[rDate] || 0) + 1;
              });

              let maxDay = "", minDay = "";
              let maxDayVal = -1, minDayVal = 999999;

              Object.keys(dayCounts).forEach(d => {
                const c = dayCounts[d];
                if (c > maxDayVal) { maxDayVal = c; maxDay = d; }
                if (c < minDayVal) { minDayVal = c; minDay = d; }
              });

              let insightText = `📌 [ĐÁNH GIÁ THÁNG ${selectedM}]: Tổng số ghi nhận trong tháng là ${monthSpecificSrc.length} trường hợp. `;
              insightText += `Ngày có tần suất vi phạm CAO NHẤT là ngày ${maxDay} (với ${maxDayVal} ca). `;
              if (maxDay !== minDay) {
                insightText += `Ngày có tần suất vi phạm THẤP NHẤT là ngày ${minDay} (với ${minDayVal} ca).`;
              }
              return insightText;
            }
          }, [activeTab, violationData, bienbanData, filterName, filterMonth]);

          const singleTrendReport = React.useMemo(() => {
            const isV = activeTab === 'vi-pham';
            const src = isV ? violationData : bienbanData;
            const counts = {};
            for (let m = 1; m <= 12; m++) counts[m] = 0;

            src.forEach(item => {
              const m = item.dateInfo.month;
              if (m >= 1 && m <= 12) counts[m]++;
            });

            const trends = [];
            for (let m = 1; m <= 12; m++) {
              const current = counts[m];
              const prev = counts[m - 1] || 0;
              let status = "—";
              if (m > 1) {
                if (prev > 0) {
                  const pct = ((current - prev) / prev) * 100;
                  status = (pct >= 0 ? `+${pct.toFixed(1)}%` : `${pct.toFixed(1)}%`) + (pct >= 0 ? " 🔺" : " 📉");
                } else if (prev === 0 && current > 0) {
                  status = "Mới 🔺";
                }
              }
              trends.push({ month: m, count: current, trendText: status });
            }
            return trends;
          }, [activeTab, violationData, bienbanData]);

          const autoResize = (ev) => {
            const target = ev.target; target.style.height = 'auto'; target.style.height = target.scrollHeight + 'px';
          };

          React.useEffect(() => {
            if (activeTab === 'report-daily') {
              setTimeout(() => {
                document.querySelectorAll('.auto-height').forEach(el => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; });
              }, 100);
            }
          }, [activeTab, inputs]);

          if (isLoading) {
            return e('div', { className: 'flex flex-col items-center justify-center min-h-screen font-bold text-slate-500' },
              e('div', { className: 'w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2' }),
              'Đang đồng bộ hóa cấu hình dữ liệu từ tháng 5 trở đi...'
            );
          }

          return e('div', { className: 'min-h-screen flex flex-col bg-slate-50' },
            e('header', { className: 'bg-slate-900 text-white p-2 flex justify-between items-center shadow-md' },
              e('h1', { className: 'text-xs font-black tracking-widest text-orange-500' }, 'SORT KTC 01 OPERATIONAL WEB'),
              e('span', { className: 'text-[10px] font-mono bg-slate-800 px-2 py-0.5 rounded text-slate-400' }, 'Dữ liệu chuẩn hóa từ tháng 5 trở đi')
            ),
            e('nav', { className: 'flex bg-white border-b font-bold text-slate-600 text-center text-xs overflow-x-auto' },
              [
                ['lich-lam-viec', 'Bảng Lịch Tuần 📅'], ['report-daily', 'Report & Tự Tính 📊'], ['vi-pham', 'Vi Phạm 🔓'], ['bien-ban', 'Biên Bản 🔓']
              ].map(tab => e('button', { key: tab[0], onClick: () => { setActiveTab(tab[0]); setFilterMonth(''); setFilterName(''); }, className: 'flex-1 min-w-[90px] py-2 border-b-2 ' + (activeTab === tab[0] ? 'border-orange-500 text-orange-600 bg-orange-50/30' : 'border-transparent') }, tab[1]))
            ),

            e('main', { className: 'p-2 w-full max-w-[100vw] mx-auto flex-1' },
              
              activeTab === 'lich-lam-viec' && e('div', { className: 'bg-white p-3 rounded border shadow-sm space-y-2' },
                e('div', { className: 'flex justify-between items-center border-b pb-1' },
                  e('h2', { className: 'font-black text-xs text-slate-800' }, 'LỊCH TRỰC BAN TOÀN DIỆN NGUYÊN TUẦN'),
                  e('div', { className: 'flex items-center gap-1 bg-slate-100 p-0.5 rounded border text-[10px]' },
                    e('button', { className: 'px-1.5 py-0.5 rounded hover:bg-white font-bold', onClick: () => setWeekOffset(p => p - 1) }, '◀'),
                    e('button', { className: 'px-1.5 py-0.5 rounded bg-orange-500 text-white font-bold', onClick: () => setWeekOffset(0) }, 'Tuần này'),
                    e('button', { className: 'px-1.5 py-0.5 rounded hover:bg-white font-bold', onClick: () => setWeekOffset(p => p + 1) }, '▶')
                  )
                ),
                e('div', { className: 'overflow-x-auto border rounded' },
                  e('table', { className: 'w-full text-left text-[10px] border-collapse' },
                    e('thead', { className: 'bg-slate-100 font-bold border-b text-center' },
                      e('tr', null,
                        e('th', { className: 'p-1.5 border-r w-20 text-left' }, 'Nhân Viên'),
                        currentWeekHeaders.map(h => e('th', { key: h.index, className: 'p-1.5 border-r bg-slate-50 min-w-[80px]' }, `${h.dayStr}\n(${h.dateStr})`))
                      )
                    ),
                    e('tbody', null, lichRows.map((row, idx) => e('tr', { key: idx, className: 'border-t hover:bg-slate-50' },
                      e('td', { className: 'p-1.5 border-r font-bold text-slate-900 bg-slate-50/50' }, row.name),
                      currentWeekHeaders.map(h => {
                        const cell = row.rawRow[h.index] || 'OFF';
