<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điều Hành Sort KTC 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body class="bg-slate-100 text-slate-800 text-xs">

    <div id="root"></div>

    <script>
        const SPREADSHEET_ID = "2PACX-1vR9Dr7VQeqSwvvbv0HCypWct2ygmiDh4wsWmBm-n7XZCeIMPuOAtePGf2w1KNPv_d7G3b6lQiCQnIMv";
        
        const URL_LICH_LAM_VIEC = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=594239313&output=csv`;
        const URL_REPORT_DAILY  = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=625772510&output=csv`;
        const URL_VI_PHAM       = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=0&output=csv`;
        const URL_BIEN_BAN      = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=735999237&output=csv`;

        const e = React.createElement;

        function parseCSV(text) {
          if (!text) return [];
          let lines = text.split(/\r\n|\n/);
          return lines.map(line => {
            let result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
              let char = line[i];
              if (char === '"') { inQuotes = !inQuotes; }
              else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
              else { current += char; }
            }
            result.push(current.trim());
            return result;
          }).filter(row => row.length > 0);
        }

        function App() {
          const [activeTab, setActiveTab] = React.useState('lich-lam-viec');
          const [isLoggedIn, setIsLoggedIn] = React.useState(false);
          const [username, setUsername] = React.useState('');
          const [password, setPassword] = React.useState('');
          
          // Bộ lọc thông tin
          const [filterName, setFilterName] = React.useState('');
          const [filterDate, setFilterDate] = React.useState('');
          const [filterMonth, setFilterMonth] = React.useState('');

          // State lưu trữ dữ liệu Sheet
          const [lichHeaders, setLichHeaders] = React.useState([]); // Lưu tiêu đề ngày, thứ
          const [lichRows, setLichRows] = React.useState([]);       // Danh sách nhân sự + lịch ca
          const [selectedDateCol, setSelectedDateCol] = React.useState(4); // Mặc định xem cột ngày đầu tiên (Cột E)

          const [violationData, setViolationData] = React.useState([]);
          const [bienbanData, setBienbanData] = React.useState([]);
          const [isLoading, setIsLoading] = React.useState(true);

          // State quản lý ĐÚNG các ô điền tay trống theo yêu cầu mới của Tiến
          const [inputs, setInputs] = React.useState({
            // Các ô điểm danh hàng ngang
            skh_leader: 3, sdung_leader: 3, note_leader: '',
            skh_nsuat: 31, sdung_nsuat: 31, note_nsuat: '1 nhân viên off bệnh',
            skh_gcong: 2,  sdung_gcong: 2,  note_gcong: '',
            skh_thuviec: 0, sdung_thuviec: 0, note_thuviec: '',
            skh_fl_had: 0,  sdung_fl_had: 0,  note_fl_had: '',
            skh_fl_viec: 0, sdung_fl_viec: 0, note_fl_viec: '',

            // Khối phụ điền tay
            feeder_cbs1: 19701,
            feeder_cbs2: 37422,
            tron_lan: 1000,
            forecast: 65000,
            act_don: 58123,
            
            // Phần 4/ Hàng hóa điền tay trống
            hang_cho_ra: 2990,
            hang_cho_xuat: 40892,
            hang_lien_vung: 0,
            hang_noi_vung: 0
          });

          React.useEffect(() => {
            async function loadAllData() {
              try {
                setIsLoading(true);

                // 1. Phân tích luồng Sheet Lịch làm việc theo cấu trúc ảnh image_6012c1.png
                const resLich = await fetch(URL_LICH_LAM_VIEC);
                const rawLich = parseCSV(await resLich.text());
                
                if (rawLich.length > 4) {
                  // Dòng 2 chứa Ngày (index 2), Dòng 3 chứa Thứ (index 3)
                  let dates = rawLich[2] || [];
                  let days = rawLich[3] || [];
                  let headers = [];
                  for(let colIdx = 4; colIdx < dates.length; colIdx++) {
                    if (dates[colIdx]) {
                      headers.push({ index: colIdx, dateStr: dates[colIdx], dayStr: days[colIdx] || '' });
                    }
                  }
                  setLichHeaders(headers);

                  // Quét danh sách nhân viên từ dòng thứ 4 trở đi (Bỏ qua header)
                  let parsedStaff = [];
                  for (let i = 4; i < rawLich.length; i++) {
                    const row = rawLich[i];
                    if (row[3] && (row[3].includes("Tổng") || row[3].includes("Nhóm"))) break; // Dừng lại khi gặp dòng tổng cộng cuối bảng
                    if (row[3]) { // Nếu có Họ Tên (Cột D - index 3)
                      parsedStaff.push({
                        gioitinh: row[0] || '',
                        stt: row[1] || '',
                        msnv: row[2] || '',
                        name: row[3],
                        rawRow: row // Giữ lại mảng gốc để lấy ca trực theo cột động
                      });
                    }
                  }
                  setLichRows(parsedStaff);
                }

                // 2. Luồng Vi phạm (gid=0)
                const resVi = await fetch(URL_VI_PHAM);
                const rowsVi = parseCSV(await resVi.text());
                let parsedVi = [];
                rowsVi.forEach((row, idx) => {
                  if (idx > 0 && row[2]) parsedVi.push({ id: idx, time: row[0], code: row[1], name: row[2], error: row[3], userId: row[4], reporter: row[5] });
                });
                setViolationData(parsedVi);

                // 3. Luồng Biên bản (gid=735999237)
                const resBb = await fetch(URL_BIEN_BAN);
                const rowsBb = parseCSV(await resBb.text());
                let parsedBb = [];
                rowsBb.forEach((row, idx) => {
                  if (idx > 0 && row[2]) parsedBb.push({ id: idx, date: row[0], username: row[1], name: row[2], content: row[3], userId: row[4], creator: row[5], image: row[6] });
                });
                setBienbanData(parsedBb);

                setIsLoading(false);
              } catch (err) {
                console.error("Lỗi đồng bộ dữ liệu: ", err);
                setIsLoading(false);
              }
            }
            loadAllData();
          }, []);

          const handleTxtChange = (key, value) => {
            setInputs(p => ({ ...p, [key]: value }));
          };
          const handleNumChange = (key, value) => {
            setInputs(p => ({ ...p, [key]: parseFloat(value) || 0 }));
          };

          // TOÀN BỘ PHÉP TÍNH TỰ ĐỘNG NHẢY SỐ THEO YÊU CẦU
          const computed = React.useMemo(() => {
            const i = inputs;
            
            // 1. Tính Giờ Công Thực Tế từng vị trí (Số Đáp Ứng * Hệ số giờ công)
            const gctt_leader = i.sdung_leader * 8;
            const gctt_nsuat = i.sdung_nsuat * 8.5;
            const gctt_gcong = i.sdung_gcong * 9.5;
            const gctt_thuviec = i.sdung_thuviec * 8;
            const gctt_fl_had = i.sdung_fl_had * 8;
            const gctt_fl_viec = i.sdung_fl_viec * 8;

            // 2. Tính tổng cộng các cột điểm danh
            const total_tns = 3 + 40 + 2 + 0 + 0 + 0; // Cố định theo form mẫu ảnh
            const total_skh = i.skh_leader + i.skh_nsuat + i.skh_gcong + i.skh_thuviec + i.skh_fl_had + i.skh_fl_viec;
            const total_sdung = i.sdung_leader + i.sdung_nsuat + i.sdung_gcong + i.sdung_thuviec + i.sdung_fl_had + i.sdung_fl_viec;
            const total_gctt = gctt_leader + gctt_nsuat + gctt_gcong + gctt_thuviec + gctt_fl_had + gctt_fl_viec;

            // 3. Tỷ lệ đáp ứng nhân sự tổng thể
            const tile_tong = total_skh > 0 ? Math.round((total_sdung / total_skh) * 100) : 0;

            // 4. Năng suất đơn/giờ công (L12) = Act (đơn) / Tổng giờ công Sort
            const nang_suat_o = total_gctt > 0 ? (i.act_don / total_gctt).toFixed(1) : 0;

            return {
              gctt_leader, gctt_nsuat, gctt_gcong, gctt_thuviec, gctt_fl_had, gctt_fl_viec,
              total_tns, total_skh, total_sdung, total_gctt, tile_tong, nang_suat_o
            };
          }, [inputs]);

          // Bộ lọc nâng cao cho Vi phạm/Biên bản
          const analytics = React.useMemo(() => {
            const isV = activeTab === 'vi-pham';
            const src = isV ? violationData : bienbanData;
            const filtered = src.filter(item => {
              const dStr = isV ? item.time : item.date;
              if (!dStr || !item.name) return false;
              return item.name.toLowerCase().includes(filterName.toLowerCase()) &&
                     (filterDate === '' || dStr.includes(filterDate)) &&
                     (filterMonth === '' || dStr.includes(`/${filterMonth}/`) || dStr.includes(`-${filterMonth}-`));
            });

            let staffCounts = {};
            filtered.forEach(item => { staffCounts[item.name] = (staffCounts[item.name] || 0) + 1; });
            return { filtered, staffCounts };
          }, [activeTab, violationData, bienbanData, filterName, filterDate, filterMonth]);

          if (isLoading) {
            return e('div', { className: 'flex flex-col items-center justify-center min-h-screen font-bold text-slate-500' },
              e('div', { className: 'w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2' }),
              'Đang xử lý cấu trúc cột Tuần từ Google Sheet...'
            );
          }

          const loginScreen = e('div', { className: 'max-w-sm mx-auto bg-white p-6 rounded-xl shadow border mt-12' },
            e('h2', { className: 'font-bold text-center text-xs uppercase mb-4 text-slate-700 tracking-wider' }, '🔐 ĐĂNG NHẬP HỆ THỐNG MẬT KHẨU CA TRỰC'),
            e('div', { className: 'space-y-3' },
              e('input', { type: 'text', placeholder: 'Tên tài khoản (admin)', className: 'w-full p-2 border rounded text-xs', value: username, onChange: ev => setUsername(ev.target.value) }),
              e('input', { type: 'password', placeholder: 'Mật khẩu', className: 'w-full p-2 border rounded text-xs', value: password, onChange: ev => setPassword(ev.target.value) }),
              e('button', { className: 'w-full bg-orange-600 text-white py-2 rounded font-bold uppercase tracking-wide text-[11px]', onClick: () => username === 'admin' && password === '123456' ? setIsLoggedIn(true) : alert('Sai thông tin ca trực!') }, 'Xác thực ca làm việc')
            )
          );

          return e('div', { className: 'min-h-screen flex flex-col bg-slate-50' },
            e('header', { className: 'bg-slate-900 text-white p-3 flex justify-between items-center' },
              e('h1', { className: 'text-xs font-black tracking-widest text-orange-500' }, 'SORT KTC 01 - TRACKING SYSTEM'),
              isLoggedIn && e('span', { className: 'text-[10px] bg-emerald-600 px-2 py-0.5 rounded text-white' }, 'Đã liên kết dữ liệu')
            ),
            
            // THANH CHUYỂN TAB 
            e('nav', { className: 'flex bg-white border-b font-bold text-slate-600 text-center text-xs' },
              [['lich-lam-viec', 'Lịch Làm Việc Theo Tuần 📅'], ['report-daily', 'Report Daily (Tự Động Tính) 📊'], ['vi-pham', 'Danh Sách Vi Phạm 🔓'], ['bien-ban', 'Biên Bản Biên Nhận 🔓']].map(tab => 
                e('button', { key: tab[0], onClick: () => setActiveTab(tab[0]), className: 'flex-1 py-3 border-b-2 transition-all ' + (activeTab === tab[0] ? 'border-orange-500 text-orange-600 bg-orange-50/40' : 'border-transparent hover:bg-slate-50') }, tab[1])
              )
            ),

            e('main', { className: 'p-3 w-full max-w-7xl mx-auto flex-1' },
              ((activeTab === 'lich-lam-viec' || activeTab === 'report-daily') && !isLoggedIn) ? loginScreen : e('div', null,
                
                // TAB 1: LỊCH LÀM VIỆC ĐƯỢC PHÂN THEO TUẦN VÀ NGÀY CHỌN ĐỘNG (image_6012c1.png)
                activeTab === 'lich-lam-viec' && e('div', { className: 'bg-white p-4 rounded border shadow-sm space-y-4' },
                  e('div', { className: 'flex flex-col sm:flex-row justify-between items-start sm:items-center border-b pb-3 gap-2' },
                    e('div', null,
                      e('h2', { className: 'font-black text-sm text-slate-800' }, 'LỊCH LÀM VIỆC CHI TIẾT THEO TUẦN'),
                      e('p', { className: 'text-[11px] text-slate-400 font-medium' }, 'Dữ liệu đồng bộ trực tiếp theo các cột ngày ngang của Google Sheet')
                    ),
                    // Dropdown chọn ngày xem trong tuần cực kỳ trực quan
                    e('div', { className: 'flex items-center gap-2' },
                      e('span', { className: 'font-bold text-slate-600' }, 'Chọn Ngày Xem Lịch:'),
                      e('select', { className: 'p-1.5 border rounded font-bold text-slate-700 bg-amber-50 border-amber-300', value: selectedDateCol, onChange: ev => setSelectedDateCol(parseInt(ev.target.value)) },
                        lichHeaders.map(h => e('option', { key: h.index, value: h.index }, `${h.dateStr} (${h.dayStr})`))
                      )
                    )
                  ),
                  e('div', { className: 'overflow-x-auto border rounded' },
                    e('table', { className: 'w-full text-left border-collapse text-[11px]' },
                      e('thead', { className: 'bg-slate-100 font-bold text-slate-700 border-b' },
                        e('tr', null,
                          e('th', { className: 'p-2 border-r w-12 text-center' }, 'Giới tính'),
                          e('th', { className: 'p-2 border-r w-10 text-center' }, 'STT'),
                          e('th', { className: 'p-2 border-r w-20' }, 'MSNV'),
                          e('th', { className: 'p-2 border-r w-40' }, 'HỌ TÊN'),
                          e('th', { className: 'p-2 bg-orange-500 text-white font-black text-center text-xs' }, 
                            lichHeaders.find(h => h.index === selectedDateCol) ? `${lichHeaders.find(h => h.index === selectedDateCol).dateStr} — ${lichHeaders.find(h => h.index === selectedDateCol).dayStr}` : 'Lịch ca trực'
                          )
                        )
                      ),
                      e('tbody', null, lichRows.map((row, idx) => {
                        const shiftText = row.rawRow[selectedDateCol] || 'OFF';
                        let bgShift = 'bg-white';
                        if (shiftText === 'OFF') bgShift = 'bg-yellow-100 text-yellow-800 font-bold';
                        else if (shiftText.includes('Tròn Lằn') || shiftText.includes('Tròn Lăn')) bgShift = 'bg-green-100 text-green-800 font-bold';
                        else if (shiftText.includes('07:30')) bgShift = 'bg-blue-50 text-blue-800 font-bold';

                        return e('tr', { key: idx, className: 'border-t hover:bg-slate-50' },
                          e('td', { className: 'p-2 border-r text-center ' + (row.gioitinh === 'Nữ' ? 'text-pink-600 font-bold':'text-slate-600') }, row.gioitinh),
                          e('td', { className: 'p-2 border-r text-center font-mono text-slate-400' }, row.stt),
                          e('td', { className: 'p-2 border-r font-mono font-medium text-slate-700' }, row.msnv),
                          e('td', { className: 'p-2 border-r font-bold text-slate-900 text-xs' }, row.name),
                          e('td', { className: `p-2 text-center transition-all ${bgShift}` }, shiftText)
                        );
                      }))
                    )
                  )
                ),

                // TAB 2: REPORT DAILY - TRÌNH BÀY ĐÚNG THEO FORM MẪU 2 ẢNH VỚI Ô TRỐNG ĐIỀN TAY + TỰ TÍNH TOÁN
                activeTab === 'report-daily' && e('div', { className: 'space-y-4' },
                  
                  // BẢNG ĐIỂM DANH MÀU CAM CHUẨN XÁC THEO ẢNH MẪU
                  e('div', { className: 'bg-white rounded border overflow-x-auto shadow-sm' },
                    e('table', { className: 'w-full border-collapse text-center text-[11px]' },
                      e('thead', null, 
                        e('tr', { className: 'bg-orange-500 text-white font-black border-orange-600' }, 
                          e('th', { colSpan: 11, className: 'p-2 text-sm text-center tracking-widest uppercase' }, 'ĐIỂM DANH SORT KTC 01'), 
                          e('th', { colSpan: 3, className: 'bg-orange-600 p-2 text-right font-mono text-sm' }, '27/06/2026')
                        ),
                        e('tr', { className: 'bg-orange-500 text-white font-bold border-t border-orange-400' }, 
                          ['Ca làm việc', 'Giờ vào', 'Giờ ra', 'Vị trí', 'Giờ Công', 'Tổng nhân sự', 'Số kế hoạch', 'Số Đáp Ứng', 'Giờ Công Thực Tế', 'Thời Gian Bù - Trừ', 'Ghi Chú', 'Tỉ Lệ', 'Đáp Ứng Đạt', 'Đáp Ứng Thiếu'].map(h => e('th', { className: 'p-1.5 border border-orange-400' }, h))
                        )
                      ),
                      e('tbody', { className: 'font-medium' },
                        // Dòng 1: Leader
                        e('tr', { className: 'hover:bg-slate-50' },
                          e('td', { rowSpan: 6, className: 'border font-black p-2 text-xs bg-slate-50 text-slate-700 border-slate-200' }, '07:00-16:00'),
                          e('td', { className: 'border font-bold' }, '07:30'), e('td', { className: 'border font-bold' }, '16:30'),
                          e('td', { className: 'border text-left pl-2 font-bold bg-slate-50' }, 'Leader'), e('td', { className: 'border font-mono font-bold' }, '8'),
                          e('td', { className: 'border text-slate-400' }, '3'),
                          e('td', { className: 'border bg-yellow-50/60 p-0' }, e('input', { type: 'number', className: 'w-full text-center p-1 bg-transparent font-bold text-blue-800', value: inputs.skh_leader, onChange: ev => handleNumChange('skh_leader', ev.target.value) })),
                          e('td', { className: 'border bg-yellow-50/60 p-0' }, e('input', { type: 'number', className: 'w-full text-center p-1 bg-transparent font-bold text-emerald-800', value: inputs.sdung_leader, onChange: ev => handleNumChange('sdung_leader', ev.target.value) })),
                          e('td', { className: 'border font-mono text-slate-600 font-bold' }, computed.gctt_leader),
                          e('td', { className: 'border bg-slate-50' }),
                          e('td', { className: 'border p-0 text-left' }, e('input', { type: 'text', className: 'w-full p-1 bg-transparent text-[10px]', placeholder: 'Nhập ghi chú...', value: inputs.note_leader, onChange: ev => handleTxtChange('note_leader', ev.target.value) })),
                          e('td', { className: 'border font-bold text-slate-500' }, '100%'),
                          e('td', { rowSpan: 6, className: 'border font-black text-center text-xs bg-emerald-50 text-emerald-700 border-slate-200' }, computed.tile_tong + '%'),
                          e('td', { rowSpan: 6, className: 'border font-black text-center text-xs bg-red-50 text-red-500 border-slate-200' }, '0%')
                        ),
                        // Dòng 2: NV Năng suất
                        e('tr', { className: 'hover:bg-slate-50' },
                          e('td', { className: 'border font-bold' }, '07:00'), e('td', { className: 'border font-bold' }, '16:30'),
                          e('td', { className: 'border text-left pl-2 font-bold bg-slate-50' }, 'NV Năng suất'), e('td', { className: 'border font-mono font-bold' }, '8.5'),
                          e('td', { className: 'border text-slate-400' }, '40'),
                          e('td', { className: 'border bg-yellow-50/60 p-0' }, e('input', { type: 'number', className: 'w-full text-center p-1 bg-transparent font-bold text-blue-800', value: inputs.skh_nsuat, onChange: ev => handleNumChange('skh_nsuat', ev.target.value) })),
                          e('td', { className: 'border bg-yellow-50/60 p-0' }, e('input', { type: 'number', className: 'w-full text-center p-1 bg-transparent font-bold text-emerald-800', value: inputs.sdung_nsuat, onChange: ev => handleNumChange('sdung_nsuat', ev.target.value) })),
                          e('td', { className: 'border font-mono text-slate-600 font-bold' }, computed.gctt_nsuat),
                          e('td', { className: 'border bg-slate-50' }),
                          e('td', { className: 'border p-0 text-left' }, e('input', { type: 'text', className: 'w-full p-1 bg-transparent text-[10px]', value: inputs.note_nsuat, onChange: ev => handleTxtChange('note_nsuat', ev.target.value) })),
                          e('td', { className: 'border font-bold text-slate-500' }, '100%')
                        ),
                        // Dòng 3: NV Giờ công
                        e('tr', { className: 'hover:bg-slate-50' },
                          e('td', { className: 'border font-bold' }, '07:00'), e('td', { className: 'border font-bold' }, '17:30'),
                          e('td', { className: 'border text-left pl-2 font-bold bg-slate-50' }, 'NV Giờ công'), e('td', { className: 'border font-mono font-bold' }, '9.5'),
                          e('td', { className: 'border text-slate-400' }, '2'),
                          e('td', { className: 'border bg-yellow-50/60 p-0' }, e('input', { type: 'number', className: 'w-full text-center p-1 bg-transparent font-bold text-blue-800', value: inputs.skh_gcong, onChange: ev => handleNumChange('skh_gcong', ev.target.value) })),
                          e('td', { className: 'border bg-yellow-50/60 p-0' }, e('input', { type: 'number', className: 'w-full text-center p-1 bg-transparent font-bold text-emerald-800', value: inputs.sdung_gcong, onChange: ev => handleNumChange('sdung_gcong', ev.target.value) })),
                          e('td', { className: 'border font-mono text-slate-600 font-bold' }, computed.gctt_gcong),
                          e('td', { className: 'border bg-slate-50' }),
                          e('td', { className: 'border p-0 text-left' }, e('input', { type: 'text', className: 'w-full p-1 bg-transparent text-[10px]', value: inputs.note_gcong, onChange: ev => handleTxtChange('note_gcong', ev.target.value) })),
                          e('td', { className: 'border font-bold text-slate-500' }, '100%')
                        ),
                        // Dòng 4: Nhân viên thử việc
